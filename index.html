<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تراث البادية الإعلامية | TB Media</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --main-red: #a31d22; 
            --dark-red: #5e1114;
            --neon-glow: #ff4444; 
            --white: #000000; /* تم استرجاع اللون الأبيض للنصوص لضمان الوضوح */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* الخلفية تقرأ الآن من المجلد مباشرة */
            background: linear-gradient(rgba(255, 255, 255 0.8), rgba(34, 5, 6, 0.8)), 
                        url('image_d9cf1c.png'); /* اسم ملف الخلفية في المجلد */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--white);
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* اللوجو في إطار دائري متوهج */
        .logo-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 0 20px 5px var(--neon-glow), 
                        inset 0 0 15px 2px var(--neon-glow);
            border: 2px solid var(--neon-glow);
            overflow: hidden; 
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.5));
        }

        h1 {
            font-size: 1.6rem;
            margin: 0 0 10px 0;
            color: var(--white);
            text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
        }

        .description {
            font-size: 1rem;
            opacity: 0.95;
            margin: 0 0 40px 0;
            font-weight: 300;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 100%;
        }

        .link-card {
            background: linear-gradient(145deg, var(--main-red), var(--dark-red));
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px 25px;
            border-radius: 50px; 
            text-decoration: none;
            color: white; /* لون النص داخل الأزرار */
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .link-card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 68, 68, 0.5);
            border-color: var(--white);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .link-card i {
            font-size: 1.4rem;
            width: 25px;
            text-align: center;
        }

        .footer {
            margin-top: 50px;
            padding-bottom: 20px;
            font-size: 0.85rem;
            opacity: 0.7;
            letter-spacing: 0.5px;
        }

        /* ألوان الأيقونات */
        .fa-whatsapp { color: #25D366; }
        .fa-map-marker-alt { color: #4285F4; }
        .fa-instagram { color: #E1306C; }
        .fa-youtube { color: #FF0000; }
        .fa-tiktok { color: #121111; }
        .fa-globe { color: #1c0202; }
        .fa-twitter { color: #4285F4; }
</style>
</head>
<body>

    <div class="container">
        <div class="logo-frame">
            <img src="logo (2).webp" alt="TB Media Logo" class="logo-img">
        </div>

        <h1>تراث البادية الإعلامية</h1>
        <p class="description">نوثق لحظاتكم بأعلى معايير الجودة</p>

        <div class="links-container">
            <a href="https://turathalbadia.com/" class="link-card" target="_blank">
                <div class="link-content">
                    <i class="fas fa-globe"></i>
                    <span>الموقع الرسمي</span>
                </div>
                <i class="fas fa-external-link-alt" style="font-size: 0.8rem; opacity: 0.7;"></i>
            </a>

            <a href="https://wa.me/966536239698" class="link-card" target="_blank">
                <div class="link-content">
                    <i class="fab fa-whatsapp"></i>
                    <span>واتساب</span>
                </div>
                <i class="fas fa-chevron-left" style="font-size: 0.8rem;"></i>
            </a>

            <a href="https://maps.app.goo.gl/DZjczs5rTV7muWtW9" class="link-card" target="_blank">
                <div class="link-content">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>موقعنا على الخريطة</span>
                </div>
                <i class="fas fa-chevron-left" style="font-size: 0.8rem;"></i>
            </a>

            <a href="https://www.tiktok.com/@tb55515" class="link-card" target="_blank">
                <div class="link-content">
                    <i class="fab fa-tiktok"></i>
                    <span>تيك توك</span>
                </div>
                <i class="fas fa-chevron-left" style="font-size: 0.8rem;"></i>
            </a>

            <a href="https://x.com/tb55515" class="link-card" target="_blank">
                <div class="link-content">
                    <i class="fab fa-twitter"></i>
                    <span> تويتر</span>
                </div>
                <i class="fas fa-chevron-left" style="font-size: 0.8rem;"></i>
            </a>

            <a href="https://www.instagram.com/tb55515/" class="link-card" target="_blank">
                <div class="link-content">
                    <i class="fab fa-instagram"></i>
                    <span>إنستقرام</span>
                </div>
                <i class="fas fa-chevron-left" style="font-size: 0.8rem;"></i>
            </a>

            <a href="https://www.youtube.com/@TBMedia360" class="link-card" target="_blank">
                <div class="link-content">
                    <i class="fab fa-youtube"></i>
                    <span>قناة اليوتيوب</span>
                </div>
                <i class="fas fa-chevron-left" style="font-size: 0.8rem;"></i>
            </a>
        </div>

        <div class="footer">
            جميع الحقوق محفوظة لـ تراث البادية © 2026
        </div>
    </div>

</body>

</html>
